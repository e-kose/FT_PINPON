<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game - WebSocket Test Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
        }
        .panel h2 { margin-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.3); padding-bottom: 10px; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-connect { background: #10b981; color: white; }
        .btn-disconnect { background: #ef4444; color: white; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary { background: #8b5cf6; color: white; }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }
        .status.connected { background: #10b981; }
        .status.disconnected { background: #ef4444; }
        .status.searching { background: #f59e0b; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .game-info { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .game-info p { margin: 5px 0; font-size: 0.9em; }
        .game-info strong { color: #fbbf24; }
        .log-container {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        .log-entry { margin: 5px 0; padding: 5px; border-left: 3px solid; padding-left: 10px; }
        .log-entry.sent { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .log-entry.received { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .log-entry.error { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .log-entry.info { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        canvas {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: #000;
            display: block;
            margin: 0 auto;
        }
        .keyboard-hint { margin-top: 10px; font-size: 0.9em; color: #fbbf24; text-align: center; }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 Pong Game Test Client</h1>

        <div class="grid">
            <div class="panel">
                <h2>🔌 Connection</h2>
                <div id="connectionStatus" class="status disconnected">DISCONNECTED</div>

                <input type="text" id="wsUrl" value="ws://localhost:3005/ws/game" placeholder="WebSocket URL">
                <input type="text" id="userId" placeholder="User ID (optional for local, required for matchmaking)">

                <div class="controls">
                    <button id="btnConnect" class="btn-connect">Connect</button>
                    <button id="btnDisconnect" class="btn-disconnect" disabled>Disconnect</button>
                </div>
            </div>

            <div class="panel">
                <h2>🎮 Game Controls</h2>

                <div class="game-info">
                    <p><strong>Room ID:</strong> <span id="roomId">-</span></p>
                    <p><strong>Mode:</strong> <span id="gameMode">-</span></p>
                    <p><strong>Status:</strong> <span id="gameStatus">-</span></p>
                    <p><strong>Opponent:</strong> <span id="opponentId">-</span></p>
                </div>

                <div class="game-info" id="statsPanel" style="display:none; margin-top: 10px; background: rgba(16, 185, 129, 0.1);">
                    <p style="font-size: 1.1em; margin-bottom: 8px;">📊 <strong>Your Stats:</strong></p>
                    <p><strong>Wins:</strong> <span id="statsWins">-</span></p>
                    <p><strong>Losses:</strong> <span id="statsLosses">-</span></p>
                    <p><strong>Total Games:</strong> <span id="statsTotalGames">-</span></p>
                    <p><strong>Win Rate:</strong> <span id="statsWinRate">-</span>%</p>
                </div>

                <div class="controls">
                    <button id="btnLocal" class="btn-primary" disabled>Create Local Game</button>
                    <button id="btnMatchmaking" class="btn-secondary" disabled>Join Matchmaking</button>
                    <button id="btnLeave" class="btn-secondary" disabled>Leave Room</button>
                    <button id="btnGetStats" class="btn-secondary" disabled>Get My Stats</button>
                    <button id="btnGetGames" class="btn-secondary" disabled>Get Recent Games</button>
                </div>

                <div class="keyboard-hint">
                    💡 Local: P1 (W/S) | P2 (↑/↓)<br>
                    Online: ↑/↓
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>🎯 Game Canvas</h2>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div class="panel" id="gamesPanel" style="display:none;">
            <h2>🎮 Recent Games</h2>
            <div id="gamesContainer" style="max-height: 400px; overflow-y: auto;">
                <!-- Games will be inserted here -->
            </div>
        </div>

        <div class="panel">
            <h2>📋 Message Log</h2>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let gameState = { roomId: null, mode: null, status: null, opponentId: null };

        const elements = {
            status: document.getElementById('connectionStatus'),
            wsUrl: document.getElementById('wsUrl'),
            userId: document.getElementById('userId'),
            btnConnect: document.getElementById('btnConnect'),
            btnDisconnect: document.getElementById('btnDisconnect'),
            btnLocal: document.getElementById('btnLocal'),
            btnMatchmaking: document.getElementById('btnMatchmaking'),
            btnLeave: document.getElementById('btnLeave'),
            btnGetStats: document.getElementById('btnGetStats'),
            btnGetGames: document.getElementById('btnGetGames'),
            logContainer: document.getElementById('logContainer'),
            roomId: document.getElementById('roomId'),
            gameMode: document.getElementById('gameMode'),
            gameStatus: document.getElementById('gameStatus'),
            opponentId: document.getElementById('opponentId'),
            canvas: document.getElementById('gameCanvas'),
            statsPanel: document.getElementById('statsPanel'),
            statsWins: document.getElementById('statsWins'),
            statsLosses: document.getElementById('statsLosses'),
            statsTotalGames: document.getElementById('statsTotalGames'),
            statsWinRate: document.getElementById('statsWinRate'),
            gamesPanel: document.getElementById('gamesPanel'),
            gamesContainer: document.getElementById('gamesContainer'),
        };

        const ctx = elements.canvas.getContext('2d');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<span style="color:#9ca3af">[${timestamp}]</span> ${message}`;
            elements.logContainer.appendChild(entry);
            elements.logContainer.scrollTop = elements.logContainer.scrollHeight;
        }

        function connect() {
            const url = elements.wsUrl.value;
            console.log('[CONNECT] URL:', url);

            ws = new WebSocket(url);

            ws.onopen = () => {
                log('✅ WebSocket connected', 'info');
                console.log('[WEBSOCKET] Connected');
                updateConnectionStatus(true);

                // Send user ID to server if available
                const userId = elements.userId.value.trim();
                if (userId) {
                    console.log('[WEBSOCKET] Sending user ID:', userId);
                    const setUserIdMsg = { type: 'SET_USER_ID', payload: { userId } };
                    ws.send(JSON.stringify(setUserIdMsg));
                } else {
                    console.log('[WEBSOCKET] No user ID provided');
                }
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                log(`⬅️ ${message.type}`, 'received');
                handleServerMessage(message);
            };

            ws.onerror = (error) => {
                log(`❌ WebSocket error`, 'error');
            };

            ws.onclose = () => {
                log('🔌 WebSocket disconnected', 'info');
                updateConnectionStatus(false);
                ws = null;
            };

            ws.onerror = (error) => {
                log('❌ WebSocket error', 'error');
                console.error('[WEBSOCKET ERROR]', error);
            };
        }

        function disconnect() {
            if (ws) ws.close();
        }

        function updateConnectionStatus(connected) {
            if (connected) {
                elements.status.textContent = 'CONNECTED';
                elements.status.className = 'status connected';
                elements.btnConnect.disabled = true;
                elements.btnDisconnect.disabled = false;
                elements.btnLocal.disabled = false;
                elements.btnMatchmaking.disabled = false;
                elements.btnGetStats.disabled = false;
                elements.btnGetGames.disabled = false;
            } else {
                elements.status.textContent = 'DISCONNECTED';
                elements.status.className = 'status disconnected';
                elements.btnConnect.disabled = false;
                elements.btnDisconnect.disabled = true;
                elements.btnLocal.disabled = true;
                elements.btnMatchmaking.disabled = true;
                elements.btnLeave.disabled = true;
                elements.btnGetStats.disabled = true;
                elements.btnGetGames.disabled = true;
                elements.statsPanel.style.display = 'none';
                elements.gamesPanel.style.display = 'none';
                gameState = { roomId: null, mode: null, status: null, opponentId: null };
                updateGameInfo();
            }
        }

        function sendMessage(type, payload = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket not connected', 'error');
                console.error('WebSocket not connected');
                return;
            }
            const message = { type, payload };
            console.log('[CLIENT SEND]', message);
            ws.send(JSON.stringify(message));
            log(`➡️ ${type} ${JSON.stringify(payload).substring(0, 50)}`, 'sent');
        }

        function handleServerMessage(message) {
            const { type, payload } = message;
            console.log('[CLIENT RECEIVE]', message);

            switch (type) {
                case 'CONNECTED':
                    log(`✅ Connected - Socket ID: ${payload.socketId}, User ID: ${payload.userId || 'none'}`, 'info');
                    break;

                case 'ROOM_CREATED':
                    log(`🏠 Room created: ${payload.roomId}, mode: ${payload.mode}`, 'info');
                    gameState.roomId = payload.roomId;
                    gameState.mode = payload.mode;
                    updateGameInfo();
                    elements.btnLeave.disabled = false;
                    break;

                case 'PLAYER_ASSIGNED':
                    log(`👤 Player assigned: ${payload.playerPosition} (${payload.userId})`, 'info');
                    break;

                case 'MATCHMAKING_SEARCHING':
                    elements.status.textContent = 'SEARCHING...';
                    elements.status.className = 'status searching';
                    break;

                case 'MATCH_FOUND':
                    gameState.roomId = payload.roomId;
                    gameState.mode = 'matchmaking';
                    gameState.opponentId = payload.opponentId;
                    updateGameInfo();
                    elements.status.textContent = 'CONNECTED';
                    elements.status.className = 'status connected';
                    elements.btnLeave.disabled = false;
                    log(`🎮 Match found! Opponent: ${payload.opponentId}`, 'info');
                    break;

                case 'PLAYER_DISCONNECTED':
                    log(`⚠️ Player disconnected! Waiting ${payload.timeout ? (payload.timeout/1000) + 's' : ''} for reconnect...`, 'info');
                    gameState.status = 'paused';
                    updateGameInfo();
                    elements.status.textContent = 'OPPONENT DISCONNECTED';
                    elements.status.className = 'status searching';
                    break;

                case 'PLAYER_RECONNECTED':
                    log(`✅ Player reconnected! Room: ${payload.roomId}, Opponent: ${payload.opponentId}`, 'info');
                    gameState.roomId = payload.roomId;
                    gameState.mode = payload.mode;
                    gameState.opponentId = payload.opponentId;
                    gameState.status = 'playing';
                    updateGameInfo();
                    elements.status.textContent = 'CONNECTED';
                    elements.status.className = 'status connected';
                    elements.btnLeave.disabled = false;
                    break;

                case 'GAME_STATE':
                    log(`🎮 Full game state received - Status: ${payload.status}`, 'info');
                    console.log('[GAME_STATE]', payload);
                    renderGameState(payload);
                    break;

                case 'STATE_UPDATE':
                    // Only log occasionally to avoid spam
                    if (Math.random() < 0.01) {
                        console.log('[STATE_UPDATE]', payload);
                    }
                    updateGameCanvas(payload);
                    break;

                case 'GAME_OVER':
                    // For local games, show position (left/right), for matchmaking show userId
                    const winnerDisplay = gameState.mode === 'local' ? payload.winner : payload.winnerId;
                    log(`🏆 Game Over! Winner: ${winnerDisplay} | Score: ${payload.finalScore.left} - ${payload.finalScore.right}`, 'info');
                    gameState.status = 'finished';
                    updateGameInfo();
                    break;

                case 'ROOM_LEFT':
                    gameState = { roomId: null, mode: null, status: null, opponentId: null };
                    updateGameInfo();
                    elements.btnLeave.disabled = true;
                    clearCanvas();
                    break;

                case 'ERROR':
                    log(`❌ Error: ${payload.message}`, 'error');
                    // If error is about duplicate connection, show prominent warning
                    if (payload.message.includes('New connection established')) {
                        alert(`⚠️ Your account was logged in from another location!\n\nYour connection has been closed.`);
                    }
                    break;
            }
        }

        function updateGameInfo() {
            elements.roomId.textContent = gameState.roomId || '-';
            elements.gameMode.textContent = gameState.mode || '-';
            elements.gameStatus.textContent = gameState.status || '-';
            elements.opponentId.textContent = gameState.opponentId || '-';
        }

        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, elements.canvas.width, elements.canvas.height);
        }

        function renderGameState(state) {
            clearCanvas();

            ctx.strokeStyle = '#444';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(400, 0);
            ctx.lineTo(400, 600);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(state.players.left.score, 200, 60);
            ctx.fillText(state.players.right.score, 600, 60);

            ctx.fillRect(
                state.players.left.paddle.position.x,
                state.players.left.paddle.position.y,
                state.config.paddleWidth,
                state.config.paddleHeight
            );
            ctx.fillRect(
                state.players.right.paddle.position.x,
                state.players.right.paddle.position.y,
                state.config.paddleWidth,
                state.config.paddleHeight
            );

            ctx.beginPath();
            ctx.arc(state.ball.position.x, state.ball.position.y, state.config.ballRadius, 0, Math.PI * 2);
            ctx.fill();

            gameState.status = state.status;
            updateGameInfo();
        }

        function updateGameCanvas(update) {
            clearCanvas();

            ctx.strokeStyle = '#444';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(400, 0);
            ctx.lineTo(400, 600);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(update.players.left.score, 200, 60);
            ctx.fillText(update.players.right.score, 600, 60);

            ctx.fillRect(20, update.players.left.paddle.y, 10, 100);
            ctx.fillRect(770, update.players.right.paddle.y, 10, 100);

            ctx.beginPath();
            ctx.arc(update.ball.x, update.ball.y, 8, 0, Math.PI * 2);
            ctx.fill();

            gameState.status = update.status;
            updateGameInfo();
        }

        document.addEventListener('keydown', (e) => {
            if (!ws || ws.readyState !== WebSocket.OPEN || !gameState.roomId) return;

            let action = null;
            let playerPosition = null;

            if (gameState.mode === 'local') {
                if (e.key === 'w' || e.key === 'W') {
                    action = 'move_up';
                    playerPosition = 'left';
                } else if (e.key === 's' || e.key === 'S') {
                    action = 'move_down';
                    playerPosition = 'left';
                } else if (e.key === 'ArrowUp') {
                    action = 'move_up';
                    playerPosition = 'right';
                    e.preventDefault();
                } else if (e.key === 'ArrowDown') {
                    action = 'move_down';
                    playerPosition = 'right';
                    e.preventDefault();
                }
            } else {
                if (e.key === 'ArrowUp') {
                    action = 'move_up';
                    e.preventDefault();
                } else if (e.key === 'ArrowDown') {
                    action = 'move_down';
                    e.preventDefault();
                }
            }

            if (action) {
                const payload = { action };
                if (playerPosition) payload.playerPosition = playerPosition;
                sendMessage('PLAYER_INPUT', payload);
            }
        });

        document.addEventListener('keyup', (e) => {
            if (!ws || ws.readyState !== WebSocket.OPEN || !gameState.roomId) return;

            let shouldStop = false;
            let playerPosition = null;

            if (gameState.mode === 'local') {
                if (e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S') {
                    shouldStop = true;
                    playerPosition = 'left';
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    shouldStop = true;
                    playerPosition = 'right';
                    e.preventDefault();
                }
            } else {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    shouldStop = true;
                    e.preventDefault();
                }
            }

            if (shouldStop) {
                const payload = { action: 'stop' };
                if (playerPosition) payload.playerPosition = playerPosition;
                sendMessage('PLAYER_INPUT', payload);
            }
        });

        elements.btnConnect.addEventListener('click', connect);
        elements.btnDisconnect.addEventListener('click', disconnect);
        elements.btnLocal.addEventListener('click', () => {
            console.log('[BUTTON] Create Local Game clicked');
            sendMessage('CREATE_LOCAL_GAME');
        });
        elements.btnMatchmaking.addEventListener('click', () => {
            console.log('[BUTTON] Join Matchmaking clicked');
            const userId = elements.userId.value.trim();
            console.log('[MATCHMAKING] User ID:', userId || 'MISSING!');
            if (!userId) {
                log('⚠️ User ID required for matchmaking!', 'error');
                alert('Please enter a User ID before joining matchmaking');
                return;
            }
            sendMessage('JOIN_MATCHMAKING');
        });
        elements.btnLeave.addEventListener('click', () => {
            console.log('[BUTTON] Leave Room clicked');
            sendMessage('LEAVE_ROOM');
        });

        elements.btnGetStats.addEventListener('click', async () => {
            const userId = elements.userId.value.trim();
            if (!userId) {
                log('⚠️ User ID required to get stats!', 'error');
                alert('Please enter a User ID first');
                return;
            }

            try {
                log(`📊 Fetching stats for user: ${userId}`, 'info');
                const response = await fetch(`/api/stats/${userId}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const stats = data.stats;

                // Update UI
                elements.statsWins.textContent = stats.wins;
                elements.statsLosses.textContent = stats.losses;
                elements.statsTotalGames.textContent = stats.totalGames;
                elements.statsWinRate.textContent = stats.winRate;
                elements.statsPanel.style.display = 'block';

                log(`✅ Stats loaded: ${stats.wins}W / ${stats.losses}L (${stats.winRate}% win rate)`, 'info');
            } catch (error) {
                log(`❌ Failed to load stats: ${error.message}`, 'error');
                console.error('[GET_STATS] Error:', error);
            }
        });

        elements.btnGetGames.addEventListener('click', async () => {
            const userId = elements.userId.value.trim();
            if (!userId) {
                log('⚠️ User ID required to get games!', 'error');
                alert('Please enter a User ID first');
                return;
            }

            try {
                log(`🎮 Fetching recent games for user: ${userId}`, 'info');
                const response = await fetch(`/api/recent-games/${userId}?limit=10`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const games = data.games;

                // Clear previous games
                elements.gamesContainer.innerHTML = '';

                if (games.length === 0) {
                    elements.gamesContainer.innerHTML = '<p style="text-align:center; color:#9ca3af; padding:20px;">No games found. Play some matchmaking games first!</p>';
                } else {
                    games.forEach((game, index) => {
                        const isWinner = game.winner_id === userId;
                        const opponentId = isWinner ? game.loser_id : game.winner_id;
                        const myScore = isWinner ? game.winner_score : game.loser_score;
                        const opponentScore = isWinner ? game.loser_score : game.winner_score;
                        const date = new Date(game.created_at).toLocaleString();

                        const gameDiv = document.createElement('div');
                        gameDiv.style.cssText = `
                            padding: 15px;
                            margin-bottom: 10px;
                            border-radius: 8px;
                            background: ${isWinner ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'};
                            border-left: 4px solid ${isWinner ? '#10b981' : '#ef4444'};
                        `;

                        gameDiv.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong style="color: ${isWinner ? '#10b981' : '#ef4444'}; font-size: 1.1em;">
                                        ${isWinner ? '✅ WIN' : '❌ LOSS'}
                                    </strong>
                                    <p style="margin: 5px 0; font-size: 0.9em; color: #9ca3af;">vs ${opponentId}</p>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 1.5em; font-weight: bold;">
                                        ${myScore} - ${opponentScore}
                                    </div>
                                    <p style="margin: 5px 0; font-size: 0.8em; color: #9ca3af;">${date}</p>
                                </div>
                            </div>
                        `;

                        elements.gamesContainer.appendChild(gameDiv);
                    });
                }

                elements.gamesPanel.style.display = 'block';
                log(`✅ Loaded ${games.length} games`, 'info');
            } catch (error) {
                log(`❌ Failed to load games: ${error.message}`, 'error');
                console.error('[GET_GAMES] Error:', error);
            }
        });

        clearCanvas();
        log('💡 WebSocket Pong Test Client ready', 'info');
    </script>
</body>
</html>
